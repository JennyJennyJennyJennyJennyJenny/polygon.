<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正多边形周长比直径计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            margin-bottom: 30px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-panel label {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .control-panel input {
            width: 120px;
            padding: 12px 16px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .control-panel input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .control-panel button {
            padding: 12px 32px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .error-tip {
            width: 100%;
            text-align: center;
            color: #e53935;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .main-content {
            display: flex;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        .canvas-container {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        #polygonCanvas {
            border-radius: 8px;
            background: #f8f9fa;
            display: block;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            min-width: 400px;
            text-align: center;
        }

        .polygon-title {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }

        .cd-label {
            font-size: 24px;
            font-weight: 600;
            color: #666;
            margin-bottom: 16px;
        }

        .cd-value {
            font-size: 56px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 30px;
        }

        .formula-desc {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
        }

        .pi-tip {
            font-size: 14px;
            color: #999;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }
            .cd-value {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <label for="sideInput">输入边数(≥3)：</label>
        <input type="number" id="sideInput" min="3" value="4">
        <button id="drawBtn">绘制计算</button>
        <div class="error-tip" id="errorTip">请输入≥3的正整数！</div>
    </div>

    <div class="main-content">
        <div class="canvas-container">
            <canvas id="polygonCanvas" width="400" height="400"></canvas>
        </div>
        <div class="info-panel">
            <div class="polygon-title" id="polygonTitle">正4边形</div>
            <div class="cd-label">周长比直径 C/d</div>
            <div class="cd-value" id="cdValue">2.8284271247</div>
            <div class="formula-desc">
                C/d = n × sin(π/n)<br>
                n = 边数，d = 外接圆直径
            </div>
            <div class="pi-tip">
                n 越大，数值越接近 π ≈ 3.1415926535
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('polygonCanvas');
        const ctx = canvas.getContext('2d');
        const sideInput = document.getElementById('sideInput');
        const drawBtn = document.getElementById('drawBtn');
        const errorTip = document.getElementById('errorTip');
        const polygonTitle = document.getElementById('polygonTitle');
        const cdValue = document.getElementById('cdValue');

        // 绘制正多边形
        function drawPolygon(n) {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const R = 150;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            for(let i=0;i<n;i++){
                const rad = 2*Math.PI*i/n - Math.PI/2;
                const x = cx + R * Math.cos(rad);
                const y = cy + R * Math.sin(rad);
                i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            }
            ctx.closePath();
            ctx.fillStyle='#e3f2fd';
            ctx.fill();
            ctx.strokeStyle='#1976d2';
            ctx.lineWidth=3;
            ctx.stroke();
        }

        // 计算 C/d
        function calcCD(n){
            return n * Math.sin(Math.PI / n);
        }

        function run(){
            const n = parseInt(sideInput.value);
            if(isNaN(n) || n<3 || !Number.isInteger(n)){
                errorTip.style.display='block';
                return;
            }
            errorTip.style.display='none';
            drawPolygon(n);
            const res = calcCD(n);
            polygonTitle.textContent = `正${n}边形`;
            cdValue.textContent = res.toFixed(10);
        }

        drawBtn.onclick = run;
        sideInput.onkeydown = e=>e.key==='Enter'&&run();
        window.onload = run;
    </script>
</body>
</html>
